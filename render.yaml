services:
  - type: web
    name: daryabot
    env: docker
    plan: free
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    branch: main
    dockerfilePath: Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_HOST
        value: https://daryabot.onrender.com
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false